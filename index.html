<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RelationMap v5.4 (Classic + AutoSave)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webcola@3.4.0/WebCola/cola.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola@2.5.1/cytoscape-cola.min.js"></script>
    <style>
        :root { --primary: #4F46E5; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { display: flex; height: 100vh; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        
        /* COLLAPSIBLE SIDEBAR LOGIC */
        #sidebar { 
            width: 340px; background: white; border-right: 1px solid #e2e8f0; 
            display: flex; flex-direction: column; padding: 20px; z-index: 1000; 
            transition: transform 0.3s ease; position: relative;
        }
        #sidebar.collapsed { transform: translateX(-340px); margin-right: -340px; }
        
        #toggle-tab {
            position: absolute; right: -30px; top: 50%; transform: translateY(-50%);
            width: 30px; height: 60px; background: white; border: 1px solid #e2e8f0;
            border-left: none; border-radius: 0 8px 8px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 12px;
        }

        #cy-container { flex-grow: 1; position: relative; background: white; }
        #cy { position: absolute; width: 100%; height: 100%; z-index: 1; }
        #overlay-canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .panel { background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: none; border: 1px solid #cbd5e1; }
        input, textarea, select { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; margin-top: 5px; }
        button { width: 100%; padding: 10px; margin-bottom: 5px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; border: none; }
        
        .status-pill { position: absolute; bottom: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <div id="toggle-tab" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">◀▶</div>
    
    <h3 style="margin-bottom:15px;">RelationMap v5.4</h3>
    <button class="btn-main" onclick="addPerson()">+ Add Person</button>
    <button onclick="addGroup()">+ Add Group</button>
    <button id="connBtn" onclick="toggleConnectionMode()">Link Mode: OFF</button>
    
    <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">

    <div id="edit-panel" class="panel">
        <label>Name:</label>
        <input type="text" id="edit-node-name" oninput="updateNodeName()">
        <label>Notes:</label>
        <textarea id="node-notes" oninput="updateNotes()"></textarea>
        <button onclick="deleteSelected()" style="color:red; margin-top:10px;">Delete</button>
    </div>

    <div id="edge-panel" class="panel">
        <label>Relation:</label>
        <input type="text" id="edge-label-input" oninput="updateEdgeLabel()">
        <label>Style:</label>
        <select id="edge-style" onchange="updateEdgeStyle()">
            <option value="solid">Solid</option>
            <option value="dashed">Dashed</option>
            <option value="dotted">Dotted</option>
        </select>
        <button onclick="deleteSelected()" style="color:red; margin-top:10px;">Delete Link</button>
    </div>

    <div id="visibility-list"></div>
    
    <div style="margin-top:auto;">
        <button onclick="saveData()">Export JSON</button>
        <button onclick="cy.fit(null, 50)">Center View</button>
    </div>
</div>

<div id="cy-container">
    <div class="status-pill" id="save-status">Auto-Save Active</div>
    <div id="cy"></div>
    <canvas id="overlay-canvas"></canvas>
</div>

<script>
    let connectionMode = false, selectedNodes = [], groups = {}, groupOrder = [];
    const canvas = document.getElementById('overlay-canvas');
    const ctx = canvas.getContext('2d');

    const cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            { selector: 'node', style: { 'width': 60, 'height': 60, 'background-color': '#4F46E5', 'label': 'data(name)', 'text-valign': 'center', 'color': '#fff', 'font-size': '12px', 'text-wrap': 'wrap', 'text-max-width': '50px' }},
            { selector: 'node[notes]', style: { 'label': 'data(name)\n(data(notes))' }},
            { selector: 'edge', style: { 'width': 3, 'line-color': '#cbd5e1', 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'label': 'data(label)', 'line-style': 'data(lineStyle)' }},
            { selector: ':selected', style: { 'border-width': 4, 'border-color': '#fbbf24' }}
        ]
    });

    // --- THE AUTO-SAVE ENGINE ---
    function autoSave() {
        const data = { 
            elements: cy.elements().map(e => ({ group: e.isNode()?'nodes':'edges', data: e.data(), position: e.position() })), 
            groups, 
            groupOrder 
        };
        localStorage.setItem('relationMapClassic_v54', JSON.stringify(data));
        document.getElementById('save-status').innerText = "✓ Saved " + new Date().toLocaleTimeString();
    }
    // Watch for moves, adds, deletes, or data changes
    cy.on('position dragfree add remove data', autoSave);

    function drawGroups() {
        canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const zoom = cy.zoom();
        groupOrder.forEach(id => {
            const g = groups[id]; if(!g || !g.visible || !g.members.length) return;
            const nodes = g.members.map(mid => cy.getElementById(mid)).filter(n => n.length > 0);
            if(!nodes.length) return;
            let pts = [];
            nodes.forEach(n => {
                const pos = n.renderedPosition(); const r = 40 * zoom;
                for(let i=0; i<8; i++) pts.push({ x: pos.x + r * Math.cos(i*Math.PI/4), y: pos.y + r * Math.sin(i*Math.PI/4) });
            });
            const hull = getConvexHull(pts);
            ctx.beginPath(); ctx.fillStyle = g.color + '22'; ctx.strokeStyle = g.color + '66';
            ctx.moveTo(hull[0].x, hull[0].y); hull.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle = g.color; ctx.fillText(g.name.toUpperCase(), pts[0].x, pts[0].y - 40);
        });
    }

    function getConvexHull(pts) {
        pts.sort((a,b) => a.x - b.x || a.y - b.y);
        const cross = (a,b,c) => (b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
        const l = []; for(let p of pts) { while(l.length>=2 && cross(l[l.length-2],l[l.length-1],p)<=0) l.pop(); l.push(p); }
        const u = []; for(let i=pts.length-1; i>=0; i--) { while(u.length>=2 && cross(u[u.length-2],u[u.length-1],pts[i])<=0) u.pop(); u.push(pts[i]); }
        return l.concat(u);
    }
    cy.on('render pan zoom', drawGroups);

    // --- CLASSIC LOGIC ---
    function addPerson() {
        const name = prompt("Name:");
        if(name) cy.add({ group:'nodes', data:{ id:'p'+Date.now(), name, notes:'', type:'person' }, position:{ x:100, y:100 } });
    }
    function addGroup() {
        const name = prompt("Group Name:");
        if(name) {
            const id = 'g'+Date.now();
            const selected = cy.$(':selected').filter('node').map(n => n.id());
            groups[id] = { name, members: selected, visible: true, color: '#4F46E5' };
            groupOrder.push(id); updateUI(); autoSave();
        }
    }
    function toggleConnectionMode() { connectionMode = !connectionMode; selectedNodes = []; document.getElementById('connBtn').innerText = `Link Mode: ${connectionMode?'ON':'OFF'}`; }
    
    cy.on('tap', (e) => {
        if(e.target === cy) { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); return; }
        const ele = e.target;
        if(ele.isNode() && connectionMode) {
            selectedNodes.push(ele.id());
            if(selectedNodes.length === 2) {
                cy.add({ group:'edges', data:{ source:selectedNodes[0], target:selectedNodes[1], lineStyle:'solid', label:'' } });
                toggleConnectionMode();
            }
        } else if(ele.isNode()) {
            document.getElementById('edit-panel').style.display = 'block';
            document.getElementById('edit-node-name').value = ele.data('name');
            document.getElementById('node-notes').value = ele.data('notes') || '';
        } else if(ele.isEdge()) {
            document.getElementById('edge-panel').style.display = 'block';
            document.getElementById('edge-label-input').value = ele.data('label') || '';
        }
    });

    function updateNodeName() { const n = cy.$(':selected')[0]; if(n) n.data('name', document.getElementById('edit-node-name').value); }
    function updateNotes() { const n = cy.$(':selected')[0]; if(n) n.data('notes', document.getElementById('node-notes').value); }
    function updateEdgeLabel() { const e = cy.$(':selected')[0]; if(e) e.data('label', document.getElementById('edge-label-input').value); }
    function updateEdgeStyle() { const e = cy.$(':selected')[0]; if(e) e.data('lineStyle', document.getElementById('edge-style').value); }
    function deleteSelected() { cy.$(':selected').remove(); }
    
    function updateUI() {
        const list = document.getElementById('visibility-list'); list.innerHTML = '<h4>Groups</h4>';
        groupOrder.forEach(id => {
            const div = document.createElement('div');
            div.innerHTML = `<button onclick="groups['${id}'].visible = !groups['${id}'].visible; drawGroups();" style="font-size:10px;">${groups[id].name} (Toggle)</button>`;
            list.appendChild(div);
        });
    }

    function saveData() {
        const data = JSON.stringify({ elements: cy.elements().map(e=>({group:e.isNode()?'nodes':'edges', data:e.data(), position:e.position()})), groups, groupOrder });
        const blob = new Blob([data], {type: "application/json"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "map_classic.json"; a.click();
    }

    window.onload = () => {
        const saved = localStorage.getItem('relationMapClassic_v54');
        if(saved) {
            const d = JSON.parse(saved); cy.add(d.elements); groups = d.groups; groupOrder = d.groupOrder;
            updateUI(); drawGroups();
        }
    };
</script>
</body>
</html>
