<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>RelationMap v5.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webcola@3.4.0/WebCola/cola.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape-cola@2.5.1/cytoscape-cola.min.js"></script>
    <style>
        :root { --primary: #4F46E5; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { display: flex; flex-direction: column; height: 100vh; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }
        
        #main-container { display: flex; flex-direction: row; flex-grow: 1; height: 100%; }
        @media (max-width: 768px) {
            #main-container { flex-direction: column; }
            #sidebar { width: 100% !important; height: 45%; border-top: 1px solid #e2e8f0; order: 2; }
            #cy-container { height: 55% !important; order: 1; }
        }

        #sidebar { width: 340px; background: white; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 15px; z-index: 1000; overflow-y: auto; }
        #cy-container { flex-grow: 1; position: relative; background: white; }
        #cy { position: absolute; width: 100%; height: 100%; z-index: 1; }
        #overlay-canvas { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; margin-top: 5px; outline: none; background: white; }
        button { width: 100%; padding: 10px; margin-bottom: 6px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; font-weight: 600; font-size: 13px; background: white; }
        .btn-main { background: var(--primary); color: white; border: none; }
        .btn-group { background: #10B981; color: white; border: none; }
        
        .panel { display: none; background: #f1f5f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #cbd5e1; }
        .section-label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin: 10px 0 5px; }
        
        .color-row { display: flex; gap: 6px; padding: 8px 0; overflow-x: auto; }
        .color-dot { min-width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #cbd5e1; cursor: pointer; }
        .color-dot.active { box-shadow: 0 0 0 2px var(--primary); transform: scale(1.1); }

        .member-checklist { max-height: 120px; overflow-y: auto; background: white; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px; margin: 5px 0; }
        .check-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .status-pill { position: absolute; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.7); color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; }
        .back-link { color: var(--primary); font-size: 12px; cursor: pointer; display: block; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="sidebar">
        <input type="text" id="search-input" placeholder="🔍 Search..." oninput="runSearch()">
        
        <div style="display:flex; gap:4px; margin-bottom: 10px; margin-top: 10px;">
            <button onclick="saveData()" style="flex:1">Export JSON</button>
            <button onclick="clearCache()" style="flex:1; color:red;">Reset App</button>
        </div>

        <button class="btn-main" onclick="addPerson()">+ Add Person</button>
        <button class="btn-group" onclick="addGroup()">+ Add Group</button>
        <button id="connBtn" onclick="toggleConnectionMode()">Link Mode: OFF</button>

        <div id="edit-panel" class="panel">
            <span class="back-link" onclick="hidePanels()">← Back to List</span>
            <input type="text" id="edit-node-name" oninput="updateNodeName()" placeholder="Name">
            <textarea id="node-notes" oninput="updateNotes()" placeholder="Notes..."></textarea>
            
            <div class="section-label">Groups</div>
            <div id="person-group-tags" class="member-checklist" style="max-height: 80px;"></div>
            
            <div class="section-label">Color</div>
            <div class="color-row" id="node-color-picker"></div>
            <button onclick="deleteSelected()" style="color:#ef4444; border:none; margin-top:5px;">Delete Person</button>
        </div>

        <div id="edge-panel" class="panel" style="background:#fff7ed;">
            <span class="back-link" onclick="hidePanels()">← Back</span>
            <input type="text" id="edge-label-input" oninput="updateEdgeLabel()" placeholder="Label">
            <div class="section-label">Line Style</div>
            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:4px;">
                <button onclick="setEdgeStyle('solid')">Solid</button>
                <button onclick="setEdgeStyle('dashed')">Dash</button>
                <button onclick="setEdgeStyle('dotted')">Dot</button>
            </div>
            <button onclick="deleteSelected()" style="color:#ef4444; border:none;">Delete Link</button>
        </div>

        <div id="group-edit-panel" class="panel" style="background:#f0fdf4;">
            <span class="back-link" onclick="hidePanels()">← Back to List</span>
            <input type="text" id="group-name-input" oninput="updateGroupName()" placeholder="Group Name">
            <div class="color-row" id="group-color-picker"></div>
            <div class="section-label">Members</div>
            <div id="member-checklist-container" class="member-checklist"></div>
            <button onclick="reorderGroup('front')">Bring to Front</button>
            <button onclick="deleteGroup()" style="color:#ef4444; border:none;">Delete Group</button>
        </div>

        <div id="visibility-list"></div>
    </div>

    <div id="cy-container">
        <div class="status-pill" id="save-status">V5.2 Synced</div>
        <div id="cy"></div>
        <canvas id="overlay-canvas"></canvas>
    </div>
</div>

<script>
    let connectionMode = false, selectedNodes = [], groups = {}, activeGroupId = null, groupOrder = [];
    const canvas = document.getElementById('overlay-canvas');
    const ctx = canvas.getContext('2d');
    const palette = ['#4F46E5', '#10B981', '#3B82F6', '#F59E0B', '#EF4444', '#8B5CF6'];

    const cy = cytoscape({
        container: document.getElementById('cy'),
        style: [
            { selector: 'node[type="person"]', style: { 'width': 65, 'height': 65, 'background-color': 'data(color)', 'label': 'data(name)', 'text-valign': 'center', 'color': '#fff', 'font-size': '12px', 'font-weight': 'bold', 'text-wrap': 'wrap', 'text-max-width': '60px', 'text-outline-width': 1.5, 'text-outline-color': '#000' }},
            { selector: 'edge', style: { 'width': 3, 'line-color': '#94a3b8', 'curve-style': 'bezier', 'target-arrow-shape': 'data(arrow)', 'line-style': 'data(lineStyle)', 'label': 'data(label)', 'edge-text-rotation': 'autorotate', 'font-size': '10px', 'text-background-opacity': 1, 'text-background-color': '#fff' }},
            { selector: ':selected', style: { 'border-width': 6, 'border-color': '#fbbf24' }}
        ]
    });

    function autoSave() {
        const data = { elements: cy.elements().map(e => ({ group: e.isNode()?'nodes':'edges', data: e.data(), position: e.position() })), groups, groupOrder };
        localStorage.setItem('relationMapData_v52', JSON.stringify(data));
        document.getElementById('save-status').innerText = "✓ Saved " + new Date().toLocaleTimeString();
    }
    cy.on('position dragfree add remove data', autoSave);

    function drawGroups() {
        canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        const zoom = cy.zoom();
        groupOrder.forEach(id => {
            const g = groups[id]; if(!g || !g.visible || !g.members.length) return;
            const nodes = g.members.map(mid => cy.getElementById(mid)).filter(n => n.length > 0);
            if(!nodes.length) return;
            
            let pts = [], minX = Infinity, minY = Infinity;
            nodes.forEach(n => {
                const pos = n.renderedPosition(); const r = 45 * zoom;
                if(pos.x < minX) minX = pos.x; if(pos.y < minY) minY = pos.y;
                for(let i=0; i<8; i++) pts.push({ x: pos.x + r * Math.cos(i*Math.PI/4), y: pos.y + r * Math.sin(i*Math.PI/4) });
            });
            
            const hull = nodes.length > 1 ? getConvexHull(pts) : pts;
            ctx.beginPath(); ctx.fillStyle = g.color + '22'; ctx.strokeStyle = g.color + '66';
            ctx.moveTo(hull[0].x, hull[0].y); hull.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.closePath(); ctx.fill(); ctx.stroke();
            
            // SHOW GROUP NAME ON MAP
            ctx.fillStyle = g.color; ctx.font = `bold ${Math.max(12, 14*zoom)}px sans-serif`;
            ctx.fillText(g.name.toUpperCase(), minX - (20*zoom), minY - (50*zoom));
        });
    }

    function getConvexHull(pts) {
        pts.sort((a,b) => a.x - b.x || a.y - b.y);
        const cross = (a,b,c) => (b.x-a.x)*(c.y-a.y)-(b.y-a.y)*(c.x-a.x);
        const l = []; for(let p of pts) { while(l.length>=2 && cross(l[l.length-2],l[l.length-1],p)<=0) l.pop(); l.push(p); }
        const u = []; for(let i=pts.length-1; i>=0; i--) { while(u.length>=2 && cross(u[u.length-2],u[u.length-1],pts[i])<=0) u.pop(); u.push(pts[i]); }
        return l.concat(u);
    }
    cy.on('render pan zoom', drawGroups);

    cy.on('tap', (e) => {
        if(e.target === cy) { hidePanels(); return; }
        const ele = e.target;
        if(ele.isEdge()) { showEdgeEdit(ele); return; }
        if(ele.data('type') === 'person') {
            if(connectionMode) {
                selectedNodes.push(ele.id());
                if(selectedNodes.length === 2) { 
                    cy.add({group:'edges', data:{source:selectedNodes[0], target:selectedNodes[1], arrow:'triangle', lineStyle:'solid', label:''}}); 
                    toggleConnectionMode(); 
                }
            } else { showPersonEdit(ele); }
        }
    });

    function showPersonEdit(node) {
        hidePanels(); document.getElementById('edit-panel').style.display='block';
        document.getElementById('edit-node-name').value = node.data('name');
        document.getElementById('node-notes').value = node.data('notes')||'';
        
        // Restore Group Selection in Person Panel
        const tags = document.getElementById('person-group-tags'); tags.innerHTML = '';
        groupOrder.forEach(gid => {
            const item = document.createElement('div'); item.className = 'check-item';
            item.innerHTML = `<input type="checkbox" ${groups[gid].members.includes(node.id())?'checked':''} onchange="toggleMember('${gid}','${node.id()}')"> ${groups[gid].name}`;
            tags.appendChild(item);
        });

        const picker = document.getElementById('node-color-picker'); picker.innerHTML='';
        palette.forEach(c => {
            const d = document.createElement('div'); d.className = `color-dot ${node.data('color')===c?'active':''}`;
            d.style.backgroundColor = c; d.onclick = () => { node.data('color', c); showPersonEdit(node); };
            picker.appendChild(d);
        });
    }

    function showEdgeEdit(edge) { hidePanels(); document.getElementById('edge-panel').style.display='block'; document.getElementById('edge-label-input').value = edge.data('label')||''; }

    function showGroupEdit(id) {
        activeGroupId = id; hidePanels(); document.getElementById('group-edit-panel').style.display='block';
        document.getElementById('group-name-input').value = groups[id].name;
        const container = document.getElementById('member-checklist-container'); container.innerHTML = '';
        cy.nodes('[type="person"]').forEach(p => {
            const item = document.createElement('div'); item.className = 'check-item';
            item.innerHTML = `<input type="checkbox" ${groups[id].members.includes(p.id())?'checked':''} onchange="toggleMember('${id}','${p.id()}')"> ${p.data('name')}`;
            container.appendChild(item);
        });
        const picker = document.getElementById('group-color-picker'); picker.innerHTML='';
        palette.forEach(c => {
            const d = document.createElement('div'); d.className = `color-dot ${groups[id].color===c?'active':''}`;
            d.style.backgroundColor = c; d.onclick = () => { groups[id].color = c; showGroupEdit(id); drawGroups(); };
            picker.appendChild(d);
        });
    }

    function toggleMember(gid, pid) {
        if(groups[gid].members.includes(pid)) groups[gid].members = groups[gid].members.filter(m=>m!==pid);
        else groups[gid].members.push(pid);
        drawGroups(); autoSave();
    }
    function updateNodeName() { const n = cy.$(':selected')[0]; if(n) n.data('name', document.getElementById('edit-node-name').value); }
    function updateNotes() { const n = cy.$(':selected')[0]; if(n) n.data('notes', document.getElementById('node-notes').value); }
    function updateEdgeLabel() { const e = cy.$(':selected')[0]; if(e && e.isEdge()) e.data('label', document.getElementById('edge-label-input').value); }
    function setEdgeStyle(s) { const e = cy.$(':selected'); if(e.isEdge()) e.data('lineStyle', s); }
    function updateGroupName() { if(activeGroupId) { groups[activeGroupId].name = document.getElementById('group-name-input').value; updateUI(); drawGroups(); } }
    
    function addPerson() { const name = prompt("Name:"); if(name) cy.add({ group:'nodes', data:{ id:'p'+Date.now(), type:'person', name, color:'#4F46E5' }, position:{ x:cy.width()/2, y:cy.height()/2 } }); }
    function addGroup() { const name = prompt("Group Name:"); if(name) { const id='g'+Date.now(); groups[id] = { name, members:[], visible:true, color:palette[groupOrder.length%palette.length] }; groupOrder.push(id); updateUI(); autoSave(); } }
    function toggleConnectionMode() { connectionMode = !connectionMode; selectedNodes = []; document.getElementById('connBtn').innerText = `Link Mode: ${connectionMode?'ON':'OFF'}`; }
    function hidePanels() { document.querySelectorAll('.panel').forEach(p=>p.style.display='none'); }
    function updateUI() {
        const list = document.getElementById('visibility-list'); list.innerHTML = '';
        groupOrder.forEach(id => {
            const div = document.createElement('div'); div.style.cssText = "padding:12px; background:#f1f5f9; border-radius:8px; margin-top:5px; font-weight:bold; display:flex; justify-content:space-between; align-items:center;";
            div.innerHTML = `<span onclick="showGroupEdit('${id}')" style="color:${groups[id].color}">${groups[id].name}</span><button onclick="toggleVis('${id}')" style="width:auto; margin:0; padding:4px 8px; font-size:10px;">${groups[id].visible?'Hide':'Show'}</button>`;
            list.appendChild(div);
        });
    }
    function toggleVis(id) { groups[id].visible = !groups[id].visible; updateUI(); drawGroups(); }
    function deleteSelected() { cy.$(':selected').remove(); hidePanels(); }
    function reorderGroup(dir) { if(!activeGroupId) return; groupOrder = groupOrder.filter(id => id !== activeGroupId); if(dir === 'front') groupOrder.push(activeGroupId); else groupOrder.unshift(activeGroupId); drawGroups(); }
    function deleteGroup() { if(confirm("Delete group?")) { delete groups[activeGroupId]; groupOrder = groupOrder.filter(id => id !== activeGroupId); hidePanels(); updateUI(); drawGroups(); } }
    function runSearch() { const t = document.getElementById('search-input').value.toLowerCase(); cy.nodes().removeClass('highlighted'); if(t) { const targets = cy.nodes('[type="person"]').filter(n => n.data('name').toLowerCase().includes(t)); targets.addClass('highlighted'); if(targets.length) cy.animate({center:{eles:targets}, zoom:1}); } }
    function clearCache() { if(confirm("Reset App? This deletes local cache (NOT your exported files).")) { localStorage.removeItem('relationMapData_v52'); location.reload(); } }
    function saveData() { const blob = new Blob([JSON.stringify({ elements: cy.elements().map(e=>({group:e.isNode()?'nodes':'edges', data:e.data(), position:e.position()})), groups, groupOrder })], {type: "application/json"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "relationmap_v52.json"; a.click(); }

    window.onload = () => {
        const saved = localStorage.getItem('relationMapData_v52');
        if(saved) {
            const d = JSON.parse(saved); cy.add(d.elements); groups = d.groups; groupOrder = d.groupOrder || Object.keys(groups);
            updateUI(); drawGroups();
        }
    };
</script>
</body>
</html>
